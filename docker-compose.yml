services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: invplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invplatform
      POSTGRES_PASSWORD: invplatform
      POSTGRES_DB: invplatform
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invplatform -d invplatform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: invplatform-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
